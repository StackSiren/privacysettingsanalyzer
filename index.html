<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Settings Analyzer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Privacy Settings Analyzer</h1>
        <p>Scan your browser settings and get a privacy score with tips to improve it.</p>
        <button id="scanBtn">Scan Now</button>
        <div id="results" class="hidden">
            <h2>Your Privacy Score: <span id="privacyScore"></span>/100</h2>
            <ul id="privacyTips"></ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
